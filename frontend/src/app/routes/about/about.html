<div class="container">
    <h1>Movie Collection</h1>
    <h2>Your ultimate companion in movie search</h2>
    
    <p>Curious about the newest movies? Or the oldest ones? Search through our Collection!</p>

    <a class="btn btn-primary"
    routerLink="/"
    routerLinkActive="active"
    ariaCurrentWhenActive="page"
    [routerLinkActiveOptions]="{exact: true}">Explore</a>


    <p><strong>Note:</strong> the application dataset is MongoDB's <a href="https://www.mongodb.com/docs/atlas/sample-data/sample-mflix/" rel="noopener noreferrer" target="_blank">Sample Mflix Dataset</a>.</p>

</div>
